name: open_books_mobile
description: "OpenBooks - Aplicación móvil de lectura de libros"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Estado
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Networking
  dio: ^5.3.0
  connectivity_plus: ^5.0.0
  
  # Navegación
  go_router: ^12.1.1
  
  # Inyección de dependencias
  get_it: ^7.6.4
  
  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  
  # UI
  cached_network_image: ^3.3.0
  
  # JSON
  json_annotation: ^4.8.1
  
  # Notificaciones
  flutter_local_notifications: ^14.0.0
  
  # HTML Parser 
  html: ^0.15.4
  
  # Environment
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - .env
