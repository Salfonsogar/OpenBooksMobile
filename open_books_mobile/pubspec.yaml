name: open_books_mobile
description: "OpenBooks - Aplicación móvil de lectura de libros"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Estado
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Networking
  dio: ^5.3.0
  connectivity_plus: ^5.0.0
  
  # Navegación
  go_router: ^12.1.1
  
  # Inyección de dependencias
  get_it: ^7.6.4
  
  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.9.0
  
  # UI
  cached_network_image: ^3.3.0
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  
  # JSON
  json_annotation: ^4.8.1
  
  # Notificaciones
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4
  
  # Animaciones
  lottie: ^3.1.0
  shimmer: ^3.0.0
  
  # SignalR
  signalr_netcore: ^1.0.0
  
  # HTML Parser 
  html: ^0.15.4
  
  # Audio / TTS
  flutter_tts: ^4.2.0
  audio_service: ^0.18.17
  just_audio: ^0.9.43
  
  # Environment
  flutter_dotenv: ^5.1.0
  
  # QR
  qr_flutter: ^4.1.0
  
  # Sensores
  battery_plus: ^6.0.3
  
  # Gráficos
  fl_chart: ^0.69.0
  
  # Exportación
  screenshot: ^3.0.0
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - .env
    - assets/animations/
